name: Build and Deploy PWA

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
          
      - name: Install dependencies
        run: npm install
        
      - name: Install PWA plugin
        run: npm install -D vite-plugin-pwa
        
      - name: Build
        run: npm run build
        
      - name: Commit dist
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add dist -f
          git commit -m "Build PWA" || echo "Nothing to commit"
          git push
